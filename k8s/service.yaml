apiVersion: v1
kind: Service
metadata:
  name: llm-chat-api-service
spec:
  selector:
    app: llm-chat-api       # finds pods with this label
  ports:
    - protocol: TCP
      port: 80              # service listens on port 80
      targetPort: 8000      # forwards to pod's port 8000
  type: ClusterIP           # internal only, Ingress handles external