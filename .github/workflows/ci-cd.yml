# ============================================================
# CI/CD Pipeline — llm-chat-api
# Triggers on every push to main branch
#
# Jobs:
#   1. test   — install deps & run basic health smoke test
#   2. build  — build Docker image & push to Docker Hub
#   3. deploy — apply k8s manifests with the new image tag
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: sandeepagowda/llm-chat-api

jobs:

  # ----------------------------------------------------------
  # JOB 1 — Test
  # Install Python dependencies and run a basic import/smoke
  # test to catch obvious breakage before building an image.
  # ----------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test — import app module
        run: python -c "from app.main import app; print('App imported successfully')"
        env:
          GROQ_API_KEY: "dummy-key-for-import-test"

  # ----------------------------------------------------------
  # JOB 2 — Build & Push Docker Image
  # Runs only on push to main (not on PRs).
  # Tags the image with:
  #   - latest
  #   - short git SHA  (e.g. sandeepagowda/llm-chat-api:abc1234)
  # ----------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract the short commit SHA for image tagging
      - name: Set image tag (short SHA)
        id: meta
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build once, push two tags: latest + SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}

  # ----------------------------------------------------------
  # JOB 3 — Deploy to Kubernetes
  # Updates the k8s Deployment to use the newly pushed image.
  # Requires KUBECONFIG secret to be set (base64-encoded).
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Write the kubeconfig from the GitHub secret
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Update the image in the Deployment to the exact SHA tag
      - name: Update image in Kubernetes
        run: |
          kubectl set image deployment/llm-chat-api \
            llm-chat-api=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      # Wait until the rollout is complete (or fail the job if not)
      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/llm-chat-api --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods -l app=llm-chat-api
