# ============================================================
# Application CI/CD Pipeline — llm-chat-api
#
# Triggers on every push/PR to main EXCEPT terraform/ changes.
# Terraform has its own pipeline (infra.yml).
#
# Jobs:
#   1. test   — pytest unit tests with coverage
#   2. scan   — Trivy container image security scan
#   3. build  — build Docker image & push to Docker Hub
#   4. deploy — deploy to EKS using Helm
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'   # terraform changes use infra.yml instead
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'

env:
  IMAGE_NAME: sandeepagowda/llm-chat-api

jobs:

  # ----------------------------------------------------------
  # JOB 1 — Test
  # Run pytest unit tests and print a coverage summary.
  # ----------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          GROQ_API_KEY: "dummy-key-for-tests"

  # ----------------------------------------------------------
  # JOB 2 — Security Scan
  # Build the image locally (no push) and scan it with Trivy
  # for known CVEs. Fails the pipeline on CRITICAL issues.
  # Runs in parallel with tests to save time.
  # ----------------------------------------------------------
  scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image locally for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan-target .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-target
          format: table
          exit-code: "1"          # fail pipeline on findings
          severity: CRITICAL      # only block on CRITICAL CVEs

  # ----------------------------------------------------------
  # JOB 3 — Build & Push Docker Image
  # Runs only on push to main (not on PRs).
  # Tags the image with:
  #   - latest
  #   - short git SHA  (e.g. sandeepagowda/llm-chat-api:abc1234)
  # ----------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}

  # ----------------------------------------------------------
  # JOB 4 — Deploy to EKS with Helm
  #
  # Helm replaces raw kubectl apply.
  # We pass the exact SHA image tag as --set image.tag=abc1234
  # No files are modified — Helm substitutes the value at deploy time.
  #
  # helm upgrade --install means:
  #   - First run : installs the release (creates all resources)
  #   - Every run after: upgrades the release (updates what changed)
  #
  # Requires secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, GROQ_API_KEY
  # ----------------------------------------------------------
  deploy:
    name: Deploy to EKS with Helm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name llm-chat-cluster

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Create groq-secret before Helm deploy so the pod can start.
      - name: Create groq-secret (if not exists)
        run: |
          kubectl create secret generic groq-secret \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Deploy using Helm.
      # --install   : create release if it doesn't exist
      # --set       : override image.tag in values.yaml at deploy time
      # --wait      : wait for pods to be ready before marking success
      # --timeout   : fail if not ready within 2 minutes
      - name: Deploy with Helm
        run: |
          helm upgrade --install llm-chat-api ./helm/llm-chat-api \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 2m

      - name: Verify pods are running
        run: kubectl get pods -l app=llm-chat-api

      - name: Print Load Balancer URL
        run: |
          echo "App is live at:"
          kubectl get svc llm-chat-api-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
