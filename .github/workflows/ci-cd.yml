# ============================================================
# CI/CD Pipeline — llm-chat-api
# Triggers on every push / PR to main branch
#
# Jobs:
#   1. test   — pytest unit tests with coverage
#   2. scan   — Trivy container image security scan
#   3. build  — build Docker image & push to Docker Hub
#   4. deploy — apply k8s manifests with the new image tag
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: sandeepagowda/llm-chat-api

jobs:

  # ----------------------------------------------------------
  # JOB 1 — Test
  # Run pytest unit tests and print a coverage summary.
  # ----------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          GROQ_API_KEY: "dummy-key-for-tests"

  # ----------------------------------------------------------
  # JOB 2 — Security Scan
  # Build the image locally (no push) and scan it with Trivy
  # for known CVEs. Fails the pipeline on CRITICAL issues.
  # Runs in parallel with tests to save time.
  # ----------------------------------------------------------
  scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image locally for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan-target .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-target
          format: table
          exit-code: "1"          # fail pipeline on findings
          severity: CRITICAL      # only block on CRITICAL CVEs

  # ----------------------------------------------------------
  # JOB 3 — Build & Push Docker Image
  # Runs only on push to main (not on PRs).
  # Tags the image with:
  #   - latest
  #   - short git SHA  (e.g. sandeepagowda/llm-chat-api:abc1234)
  # ----------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, scan]           # both must pass before building
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract the short commit SHA for image tagging
      - name: Set image tag (short SHA)
        id: meta
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build once, push two tags: latest + SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}

  # ----------------------------------------------------------
  # JOB 3 — Deploy to Kubernetes
  # 1. Creates the groq-secret if it doesn't exist yet
  # 2. Applies all k8s manifests (creates resources if missing,
  #    updates them if they already exist — idempotent)
  # 3. Updates the Deployment image to the exact SHA tag
  # 4. Waits for the rollout to finish
  #
  # Requires secrets: KUBECONFIG, GROQ_API_KEY
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Write the kubeconfig from the GitHub secret
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Create the groq-secret in k8s if it doesn't exist yet.
      # --dry-run=client + apply makes this safe to re-run.
      - name: Create groq-secret (if not exists)
        run: |
          kubectl create secret generic groq-secret \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Apply all manifests — kubectl apply is idempotent:
      # creates resources on first run, updates on subsequent runs
      - name: Apply k8s manifests
        run: kubectl apply -f k8s/

      # Now update the Deployment image to the exact SHA tag built above
      - name: Update image to new version
        run: |
          kubectl set image deployment/llm-chat-api \
            llm-chat-api=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      # Wait until the rollout is complete (or fail the job if not)
      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/llm-chat-api --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods -l app=llm-chat-api
